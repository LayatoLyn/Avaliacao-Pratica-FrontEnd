<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contato.css">
    <title>Document</title>
</head>
<body>
    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contato.html">Contato</a>
    </nav>

    <section>
        <img src="img/banner-contato.jpg" alt="" id="foto-de-fundo">
    </section>

    <h1 class="titulo">Contato</h1>

    <fieldset class="formulario">
        <legend></legend>

        <div>
            <label for="Nome">Digite o nome da pessoa/empresa:</label>
            <input type="text" name="Nome" placeholder="Digite o nome">
        </div>
        <div>
            <label for="Email">Email:</label>
            <input type="email" name="Email" placeholder="Digite seu email">
        </div>
        <div>
            <label for="Trabalho">Tipo de trabalho:</label>
            <select name="Trabalho" id="trabalho" placeholder="Selecione o tipo de trabalho">
                <option value="1">Comission</option>
                <option value="2">Projeto</option>
                <option value="3">Exposição</option>
            </select>
        </div>
        <div>
            <label for="Descricao">Descrição:</label>
            <textarea name="Descricao" id="descricao" cols="" rows="" placeholder="Digite mais informações que deseja adicionar..."></textarea>
        </div>

        <button id="enviar" name="envia">Enviar</button>
    </fieldset>

    <footer>
        <p class="#">Sociais:</p>
    </footer>

    <script src="javascript/formulario.js"></script>
    
</body>
</html>
